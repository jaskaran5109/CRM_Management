# Render Configuration File
# This file configures automatic deployment on Render.com

services:
  - type: web
    name: crm-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      
      # Add your actual values in Render Environment section:
      # MONGODB_URI
      # JWT_SECRET
      # CORS_ORIGIN
      # RESEND_API_KEY
      # RESEND_FROM_EMAIL
