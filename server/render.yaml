# Render Configuration File
# This file configures automatic deployment on Render.com

services:
  - type: web
    name: crm-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX
        value: 150
      
      # Add your actual values in Render Environment section:
      # MONGO_URI or MONGODB_URI
      # JWT_SECRET
      # FRONTEND_URL
      # CORS_ORIGIN
      # ADDITIONAL_CORS_ORIGINS
      # RESEND_API_KEY
      # EMAIL_FROM
